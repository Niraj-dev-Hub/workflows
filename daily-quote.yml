name: Daily Quote

on:
  schedule:
    - cron: "30 2 * * *"  # 8 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Get Quote
        id: quote
        run: |
          QUOTE=$(curl -s "https://api.quotable.io/random" | jq -r '.content')
          AUTHOR=$(curl -s "https://api.quotable.io/random" | jq -r '.author')
          echo "QUOTE=$QUOTE" >> $GITHUB_OUTPUT
          echo "AUTHOR=$AUTHOR" >> $GITHUB_OUTPUT
      
      - name: Update README
        run: |
          DATE=$(date '+%d %B %Y')
          echo "# Daily Quotes" > README.md
          echo "" >> README.md
          echo "## $DATE" >> README.md
          echo "> \"${{ steps.quote.outputs.QUOTE }}\"" >> README.md
          echo "" >> README.md
          echo "— *${{ steps.quote.outputs.AUTHOR }}*" >> README.md
      
      - name: Commit
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add README.md
          git commit -m "📝 Daily quote $(date '+%Y-%m-%d')" || echo "No changes"
          git push
